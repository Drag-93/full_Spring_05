<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>회원목록</title>
    <link rel="stylesheet" th:href="@{/css/member/memberList2.css}">
</head>
<body>
<div th:replace="~{/fragments/common/header :: headerFragment}"></div>
<div class="memberList">
    <div class="memberList-con">
        <h1>회원목록페이지</h1>
        <div class="search">
<!--            검색-->
            <form th:action="@{/member/memberList2}" method="get">
                <select name="subject">
                    <option value="" th:selected="${param.subject== null or param.subject[0] == ''}">::선택::</option>
                    <option value="userEmail" th:selected="${param.subject != null and param.subject[0] == 'userEmail'}">이메일
                    </option>
                    <option value="address" th:selected="${param.subject != null and param.subject[0] == 'address'}">
                        주소
                    </option>
                    <option value="userName" th:selected="${param.subject != null and param.subject[0] == 'userName'}">
                        이름
                    </option>
                </select>

                <input type="text" name="search" th:value="${param.search}">
                <input type="submit" value="검색">
            </form>
        </div>

        <table class="member-table">
            <thead>
            <tr>
                <th>번호</th>
                <th>이메일</th>
                <th>비빌번호</th>
                <th>이름</th>
                <th>주소</th>
                <th>가입일</th>
                <th>보기</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="member, loop : ${memberList}">
                <td th:text="${memberList.number * memberList.size + loop.index + 1}"></td>
                <td th:text="${member.userEmail}"></td>
                <td th:text="${member.userPw}"></td>
                <td th:text="${member.userName}"></td>
                <td th:text="${member.address}"></td>
                <td th:text="${#temporals.format(member.createTime, 'yyyy-MM-dd HH:mm')}"></td>
                <td>
                    <a th:href="@{/member/detail/{id}(id=${member.id})}" class="btn-detail">상세보기</a>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(memberList)}">
                <td colspan="7" style="text-align: center; padding: 50px;">가입된 회원이 없습니다.</td>
            </tr>
            </tbody>
        </table>
    </div>

<div class="paging">
    <ul>
        <!-- 처음-->
        <li>
            <span th:if="${newPage==0}" class="span0">START</span>
            <span th:unless="${newPage==0}">
                <a th:href="@{/member/memberList2(page=0, subject=${param.subject}, search=${param.search})}" class="span1">처음</a>
            </span>
        </li>
        <!--        이전-->
        <li>
            <span th:if="${newPage==0}" class="span0">PRE</span>
            <span th:unless="${newPage==0}">
                <a th:href="@{/member/memberList2(page=${newPage - 1}, subject=${param.subject}, search=${param.search})}" class="span1">이전</a>
            </span>
        </li>
        <!--        페이지 번호-->
        <li th:each="i:${#numbers.sequence(startPage,endPage)}" class="block">
            <span th:if="${i==newPage + 1}"
                  th:text="${i}" class="now"></span>
            <a th:unless="${i==newPage + 1}"
               th:href="@{/member/memberList2(page=${i - 1}, subject=${param.subject}, search=${param.search})}"
               th:text="${i}"></a>
        </li>
        <!--        다음-->
        <li>
            <span th:if="${newPage + 1 == memberList.totalPages}" class="span0">NEXT</span>
            <span th:unless="${newPage + 1 == memberList.totalPages}">
                <a th:href="@{/member/memberList2(page=${newPage + 1}, subject=${param.subject}, search=${param.search})}" class="span1">다음</a>
            </span>
        </li>
        <!--        마지막-->
        <li>
            <span th:if="${newPage + 1 == memberList.totalPages}" class="span0">END</span>
            <span th:unless="${newPage + 1 == memberList.totalPages}">
                <a th:href="@{/member/memberList2(page=${memberList.totalPages - 1}, subject=${param.subject}, search=${param.search})}" class="span1">마지막</a>
            </span>
        </li>
    </ul>
</div>
</div>
<div th:replace="~{/fragments/common/footer :: footerFragment}"></div>
</body>
</html>
